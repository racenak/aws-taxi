name: Deploy

on:
  push:
    branches:
      - aws-oidc-test

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.ACTION_ROLE_ARN }}
        aws-region: ap-southeast-1

