name: Deploy

on:
  push:
    branches:
      - aws-oidc-test

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.ACTION_ROLE_ARN }}
        aws-region: ap-southeast-1
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: nyc-taxi-lambda-repo # Tên repo trong Terraform của bạn
        IMAGE_TAG: latest
      run: |
        # Build cho nền tảng linux/arm64 để khớp với Graviton của Lambda
        docker buildx build --platform linux/arm64 \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          --push

    - name: Update Lambda Function
      run: |
        aws lambda update-function-code \
          --function-name nyc_taxi_ingest_container \
          --image-uri ${{ steps.login-ecr.outputs.registry }}/nyc-taxi-lambda-repo:latest